name: Release

# Manually triggered. Bumps `MARKETING_VERSION` and `CURRENT_PROJECT_VERSION`
# in project.yml, commits the change, and pushes a `v<version>` tag. The tag
# push then triggers the `archive` job in ci.yml which builds, signs,
# notarizes, and drafts a GitHub release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.1.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: Bump version + tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error ::Version must be x.y.z (got '${{ inputs.version }}')"
            exit 1
          fi

      - name: Verify tag does not already exist
        run: |
          if git rev-parse --verify "refs/tags/v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error ::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Bump versions in project.yml
        id: bump
        run: |
          VERSION="${{ inputs.version }}"

          # MARKETING_VERSION (quoted)
          sed -i.bak -E "s/(MARKETING_VERSION:[[:space:]]*\")[^\"]+(\")/\\1${VERSION}\\2/" project.yml

          # CURRENT_PROJECT_VERSION (unquoted integer): increment by 1
          current=$(grep -E '^[[:space:]]*CURRENT_PROJECT_VERSION:' project.yml | sed -E 's/.*:[[:space:]]*([0-9]+).*/\1/' | head -1)
          if [ -z "$current" ]; then
            echo "::error ::Could not parse CURRENT_PROJECT_VERSION from project.yml"
            exit 1
          fi
          next=$((current + 1))
          sed -i.bak -E "s/(CURRENT_PROJECT_VERSION:[[:space:]]*)[0-9]+/\\1${next}/" project.yml

          rm -f project.yml.bak

          echo "marketing=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$next" >> "$GITHUB_OUTPUT"

          echo "Bumped to MARKETING_VERSION=$VERSION, CURRENT_PROJECT_VERSION=$next"
          echo "----"
          grep -E "(MARKETING_VERSION|CURRENT_PROJECT_VERSION):" project.yml

      - name: Commit + tag + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project.yml
          git commit -m "Release v${{ inputs.version }} (build ${{ steps.bump.outputs.build }})"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push
          git push --tags

      - name: Summary
        run: |
          {
            echo "### Released v${{ inputs.version }}"
            echo ""
            echo "- MARKETING_VERSION: ${{ steps.bump.outputs.marketing }}"
            echo "- CURRENT_PROJECT_VERSION: ${{ steps.bump.outputs.build }}"
            echo ""
            echo "The pushed tag triggers the \`archive\` job in ci.yml. Once it"
            echo "finishes, a draft release will be ready at the [Releases page](../../releases)."
          } >> "$GITHUB_STEP_SUMMARY"
