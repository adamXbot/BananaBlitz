name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme BananaBlitz \
            -destination 'platform=macOS' \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || (xcodebuild -showdestinations -scheme BananaBlitz; exit 1)

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

  archive:
    name: Archive (release tags)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: write   # required to create a draft release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Signing setup ─────────────────────────────────────────────────────
      # Whether secrets are configured. We can't reference `secrets.X` directly
      # in `if:` conditions cleanly, so we set an output once.
      - name: Detect signing configuration
        id: signing
        env:
          CERT_B64: ${{ secrets.APPLE_DEVELOPER_CERT_BASE64 }}
          AC_API_KEY: ${{ secrets.AC_API_KEY_BASE64 }}
        run: |
          if [ -n "$CERT_B64" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::APPLE_DEVELOPER_CERT_BASE64 not set; producing UNSIGNED build."
          fi
          if [ -n "$AC_API_KEY" ]; then
            echo "notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "notarize=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::AC_API_KEY_BASE64 not set; skipping notarization."
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.configured == 'true'
        env:
          CERT_B64: ${{ secrets.APPLE_DEVELOPER_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temp-build-keychain' }}
        run: |
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$RUNNER_TEMP/cert.p12" \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          rm "$RUNNER_TEMP/cert.p12"

      - name: Resolve signing identity
        if: steps.signing.outputs.configured == 'true'
        id: identity
        run: |
          ident=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -n1 \
            | awk -F '"' '{print $2}')
          if [ -z "$ident" ]; then
            echo "::error ::Could not find a Developer ID Application identity in the imported keychain."
            exit 1
          fi
          echo "name=$ident" >> "$GITHUB_OUTPUT"
          echo "Using identity: $ident"

      # ── Archive ───────────────────────────────────────────────────────────
      - name: Archive (signed)
        if: steps.signing.outputs.configured == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -scheme BananaBlitz \
            -configuration Release \
            -archivePath build/BananaBlitz.xcarchive \
            CODE_SIGN_IDENTITY="${{ steps.identity.outputs.name }}" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS='--timestamp --options=runtime'

      - name: Archive (unsigned fallback)
        if: steps.signing.outputs.configured != 'true'
        run: |
          xcodebuild archive \
            -scheme BananaBlitz \
            -configuration Release \
            -archivePath build/BananaBlitz.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .app from xcarchive
        run: |
          mkdir -p build/export
          cp -R build/BananaBlitz.xcarchive/Products/Applications/BananaBlitz.app build/export/

      # ── Notarization ──────────────────────────────────────────────────────
      - name: Notarize + staple
        if: steps.signing.outputs.configured == 'true' && steps.signing.outputs.notarize == 'true'
        env:
          AC_API_KEY: ${{ secrets.AC_API_KEY_BASE64 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          echo "$AC_API_KEY" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

          # Notarytool needs a zipped bundle.
          ditto -c -k --keepParent build/export/BananaBlitz.app build/export/BananaBlitz-for-notarization.zip

          xcrun notarytool submit build/export/BananaBlitz-for-notarization.zip \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait

          rm "$RUNNER_TEMP/AuthKey.p8"
          rm build/export/BananaBlitz-for-notarization.zip

          xcrun stapler staple build/export/BananaBlitz.app

      # ── Package release artifact ──────────────────────────────────────────
      - name: Zip release artifact
        id: zip
        run: |
          cd build/export
          if [ "${{ steps.signing.outputs.configured }}" = "true" ]; then
            ditto -c -k --keepParent BananaBlitz.app BananaBlitz.zip
            echo "name=BananaBlitz.zip" >> "$GITHUB_OUTPUT"
          else
            ditto -c -k --keepParent BananaBlitz.app BananaBlitz-unsigned.zip
            echo "name=BananaBlitz-unsigned.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.signing.outputs.configured == 'true' && 'BananaBlitz-signed' || 'BananaBlitz-unsigned' }}
          path: build/export/*.zip
          retention-days: 30

      # ── Draft GitHub Release ──────────────────────────────────────────────
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/export/*.zip
          draft: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
          body: |
            **Build status**

            - Signed: `${{ steps.signing.outputs.configured }}`
            - Notarized: `${{ steps.signing.outputs.notarize }}`

            Review the artifact, then publish this draft to release.

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Delete signing keychain
        if: always() && steps.signing.outputs.configured == 'true'
        run: security delete-keychain build.keychain || true
