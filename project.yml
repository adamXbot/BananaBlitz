name: BananaBlitz

options:
  bundleIdPrefix: com.bananablitz
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    DEAD_CODE_STRIPPING: YES

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  BananaBlitz:
    type: application
    platform: macOS
    sources:
      - path: BananaBlitz
        excludes:
          - "Info.plist"
          - "BananaBlitz.entitlements"
    dependencies:
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: BananaBlitz/Info.plist
        CODE_SIGN_ENTITLEMENTS: BananaBlitz/BananaBlitz.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.bananablitz.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES

  BananaBlitzTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BananaBlitzTests
    dependencies:
      - target: BananaBlitz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bananablitz.tests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BananaBlitz:
    build:
      targets:
        BananaBlitz: all
        BananaBlitzTests: [test]
    test:
      targets:
        - BananaBlitzTests
      gatherCoverageData: true
    run:
      config: Debug
